    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 30px;
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 28px;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      label {
        font-weight: bold;
        color: #555;
      }
      input[type="datetime-local"] {
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        min-width: 220px;
      }
      input[type="datetime-local"]:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        padding: 10px 25px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }
      .refresh-btn {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }
      .chart-container {
        overflow-x: auto;
        padding-bottom: 10px;
      }
      .chart {
        display: inline-block;
        border-collapse: collapse;
        min-width: 100%;
      }
      .chart th {
        background: #f8f9fa;
        padding: 8px 12px;
        text-align: center;
        font-weight: bold;
        color: #666;
        font-size: 12px;
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .chart td.time-label {
        background: #f8f9fa;
        padding: 8px 12px;
        text-align: right;
        font-weight: bold;
        color: #666;
        font-size: 12px;
        white-space: nowrap;
        position: sticky;
        left: 0;
        z-index: 10;
        min-width: 80px;
      }
      .chart td.cell {
        width: 30px;
        height: 36px;
        border: 1px solid #e0e0e0;
        cursor: pointer;
        transition: transform 0.1s;
        position: relative;
      }
      .chart td.cell:hover {
        transform: scale(1.2);
        z-index: 20;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
      .chart td.cell.main {
        background-color: #2ecc71;
      }
      .chart td.cell.pre,
      .chart td.cell.post {
        background-color: rgba(46, 204, 113, 0.5);
      }
      .chart td.cell.closed {
        background-color: #f5f5f5;
      }
      .chart td.cell.holiday {
        background-color: #ffcccc;
      }
      .chart td.cell.weekend {
        background-color: #e0e0e0;
      }
      .chart td.cell.current-time {
        box-shadow: inset 0 0 0 3px #e74c3c;
      }
      .legend {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .legend-color {
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      .tooltip {
        position: absolute;
        background: #333;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        font-size: 12px;
        pointer-events: none;
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      .tooltip.show {
        opacity: 1;
      }
      .exchange-info {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
        font-size: 14px;
        color: #555;
      }
      .loading {
        color: #667eea;
        font-weight: bold;
      }
    </style>

      function getNthWeekday(year, month, nth, weekday) {
        const daysInMonth = [
          31,
          (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0 ? 29 : 28,
          31,
          30,
          31,
          30,
          31,
          31,
          30,
          31,
          30,
          31,
        ];
        let day = 1;
        const currentWeekday = new Date(year, month - 1, day).getDay();
        let delta = (weekday - currentWeekday + 7) % 7;
        day += delta;
        day += (nth - 1) * 7;
        if (day > daysInMonth[month - 1]) day -= 7;
        return new Date(year, month - 1, day);
      }

      function isDst(date, exchange) {
        if (!exchange.has_dst) return false;
        const year = date.getFullYear();
        if (exchange.dst_start_month < exchange.dst_end_month) {
          const dstStart = getNthWeekday(
            year,
            exchange.dst_start_month,
            exchange.dst_start_week,
            exchange.dst_start_weekday,
          );
          const dstEnd = getNthWeekday(
            year,
            exchange.dst_end_month,
            exchange.dst_end_week,
            exchange.dst_end_weekday,
          );
          return date >= dstStart && date < dstEnd;
        } else {
          const dstStart = getNthWeekday(
            year,
            exchange.dst_start_month,
            exchange.dst_start_week,
            exchange.dst_start_weekday,
          );
          const dstEnd = getNthWeekday(
            year,
            exchange.dst_end_month,
            exchange.dst_end_week,
            exchange.dst_end_weekday,
          );
          return date >= dstStart || date < dstEnd;
        }
      }

      function getTzOffset(date, exchange) {
        return isDst(date, exchange) ? exchange.tz_dst : exchange.tz_std;
      }

      function getLocalDate(date, exchange) {
        const tzOffset = getTzOffset(date, exchange);
        const utc = date.getTime() + tzOffset * 3600000;
        return new Date(utc).toISOString().split("T")[0];
      }

      function getLocalDayOfWeek(date, exchange) {
        const tzOffset = getTzOffset(date, exchange);
        const utc = date.getTime() + tzOffset * 3600000;
        return new Date(utc).getDay();
      }

      function isWeekend(date, exchange) {
        const weekendDays = exchange.weekend_days || [0, 6];
        return weekendDays.includes(getLocalDayOfWeek(date, exchange));
      }

      function isHoliday(date, exchange) {
        if (!exchange.holidays || exchange.holidays.length === 0) return false;
        return exchange.holidays.includes(getLocalDate(date, exchange));
      }

      function getTradingStatus(beijingTime, exchange) {
        if (isWeekend(beijingTime, exchange)) return "weekend";
        if (isHoliday(beijingTime, exchange)) return "holiday";
        const tzOffset = getTzOffset(beijingTime, exchange);
        let localHour =
          (beijingTime.getUTCHours() +
            beijingTime.getUTCMinutes() / 60 +
            tzOffset +
            24) %
          24;
        for (const session of exchange.sessions) {
          if (localHour >= session.start && localHour < session.end)
            return session.type;
        }
        return "closed";
      }

      function formatTime(date) {
        let beijingHour = date.getUTCHours() + 8;
        if (beijingHour >= 24) beijingHour -= 24;
        return (
          String(beijingHour).padStart(2, "0") +
          ":" +
          String(date.getUTCMinutes()).padStart(2, "0")
        );
      }

      function formatDate(date) {
        let year = date.getUTCFullYear();
        let month = date.getUTCMonth() + 1;
        let day = date.getUTCDate();
        if (date.getUTCHours() >= 16) {
          day++;
          if (
            day >
            [
              31,
              28 +
                ((year % 4 == 0 && year % 100 != 0) || year % 400 == 0 ? 1 : 0),
              31,
              30,
              31,
              30,
              31,
              31,
              30,
              31,
              30,
              31,
            ][month - 1]
          ) {
            day = 1;
            month++;
            if (month > 12) {
              month = 1;
              year++;
            }
          }
        }
        return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      }

      function toDatetimeLocal(date) {
        let beijingHour = date.getUTCHours() + 8;
        let beijingMinute = Math.floor(date.getUTCMinutes() / 30) * 30;
        let year = date.getUTCFullYear(),
          month = date.getUTCMonth() + 1,
          day = date.getUTCDate();
        if (beijingHour >= 24) {
          beijingHour -= 24;
          day++;
          if (
            day >
            [
              31,
              28 +
                ((year % 4 == 0 && year % 100 != 0) || year % 400 == 0 ? 1 : 0),
              31,
              30,
              31,
              30,
              31,
              31,
              30,
              31,
              30,
              31,
            ][month - 1]
          ) {
            day = 1;
            month++;
            if (month > 12) {
              month = 1;
              year++;
            }
          }
        }
        return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}T${String(beijingHour).padStart(2, "0")}:${String(beijingMinute).padStart(2, "0")}`;
      }

      function parseBeijingTime(datetimeStr) {
        const [dateStr, timeStr] = datetimeStr.split("T");
        const [year, month, day] = dateStr.split("-").map(Number);
        const [beijingHour, beijingMinute] = timeStr.split(":").map(Number);
        let utcHour = beijingHour - 8;
        let d = new Date(
          Date.UTC(year, month - 1, day, utcHour, beijingMinute),
        );
        if (utcHour < 0) d.setDate(d.getDate() - 1);
        return d;
      }

      let selectedTime = new Date(

        ),
      );

      function useCurrentTime() {
        const now = new Date();
        selectedTime = new Date(

            Math.floor(now.getUTCMinutes() / 30) * 30,
          ),

        document.getElementById("selectedTime").value =

        renderChart();
      }

      function shiftTime(hours) {
        selectedTime = new Date(selectedTime.getTime() + hours * 3600000);
        document.getElementById("selectedTime").value =
          toDatetimeLocal(selectedTime);
        renderChart();
      }

      document

      function renderChart() {
        const chart = document.getElementById("heatmapChart");
        const thead = chart.querySelector("thead tr");
        const tbody = chart.querySelector("tbody");
        thead.innerHTML = "<th>交易所</th>";

        const startTime = new Date(selectedTime.getTime() - 4 * 3600000);
        const endTime = new Date(selectedTime.getTime() + 24 * 3600000);

        for (
          let d = new Date(startTime);
          d <= endTime;
          d = new Date(d.getTime() + 30 * 60000)
        ) {
          const th = document.createElement("th");
          th.textContent = formatTime(d);
          if (Math.abs(d.getTime() - selectedTime.getTime()) < 30 * 60000)
            th.style.backgroundColor = "#FFF3CD";
          thead.appendChild(th);
        }

        tbody.innerHTML = "";
        EXCHANGES.forEach((exchange) => {
          const tr = document.createElement("tr");
          const tdLabel = document.createElement("td");
          tdLabel.className = "time-label";
          tdLabel.textContent = exchange.name;
          tr.appendChild(tdLabel);

          for (
            let d = new Date(startTime);
            d <= endTime;
            d = new Date(d.getTime() + 30 * 60000)
          ) {
            const td = document.createElement("td");
            td.className = "cell " + getTradingStatus(d, exchange);
            if (Math.abs(d.getTime() - selectedTime.getTime()) < 30 * 60000)
              td.classList.add("current-time");

            td.addEventListener("mouseenter", (e) => {
              const tooltip = document.getElementById("tooltip");
              const tzOffset = getTzOffset(d, exchange);
              let localHour =
                (d.getUTCHours() + d.getUTCMinutes() / 60 + tzOffset + 24) % 24;
              const localTimeStr =
                localHour >= 24
                  ? "00:" +
                    String(Math.floor((localHour % 1) * 60)).padStart(2, "0")
                  : String(Math.floor(localHour)).padStart(2, "0") +
                    ":" +
                    String(Math.floor((localHour % 1) * 60)).padStart(2, "0");

              const status = getTradingStatus(d, exchange);
              let statusText = "";
              if (status === "main") statusText = "🟢 正常交易";
              else if (status === "pre") statusText = "🟡 盘前交易";
              else if (status === "post") statusText = "🟡 盘后交易";
              else if (status === "holiday") statusText = "🔴 公众假期";
              else if (status === "weekend") statusText = "⚪ 周末休息";
              else statusText = "🔴 非交易时间";

              tooltip.innerHTML = `<strong>${exchange.name}</strong><br>北京时间: ${formatDate(d)} ${formatTime(d)}<br>当地时间: ${getLocalDate(d, exchange)} ${localTimeStr} (UTC${tzOffset >= 0 ? "+" : ""}${tzOffset})<br>${statusText}`;
              tooltip.style.left = e.clientX + 10 + "px";
              tooltip.style.top = e.clientY + 10 + "px";
              tooltip.classList.add("show");
            });

            td.addEventListener("mouseleave", () =>
              document.getElementById("tooltip").classList.remove("show"),
            );
            td.addEventListener("click", () => {
              selectedTime = new Date(d);
              document.getElementById("selectedTime").value =
                toDatetimeLocal(selectedTime);
              renderChart();
            });
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        });
        updateExchangeInfo();
      }

      function updateExchangeInfo() {
        const infoDiv = document.getElementById("exchangeInfo");
        let html = `<strong>当前选择时间:</strong> ${formatDate(selectedTime)} ${formatTime(selectedTime)} (UTC+8)<br><br>`;

        EXCHANGES.forEach((exchange) => {
          const status = getTradingStatus(selectedTime, exchange);
          const tzOffset = getTzOffset(selectedTime, exchange);
          let localHour =
            (selectedTime.getUTCHours() +
              selectedTime.getUTCMinutes() / 60 +
              tzOffset +
              24) %
            24;
          const localTimeStr =
            localHour >= 24
              ? "00:" +
                String(Math.floor((localHour % 1) * 60)).padStart(2, "0")
              : String(Math.floor(localHour)).padStart(2, "0") +
                ":" +
                String(Math.floor((localHour % 1) * 60)).padStart(2, "0");

          let statusText = "",
            statusColor = "";
          if (status === "main") {
            statusText = "正常交易中";
            statusColor = "#2ECC71";
          } else if (status === "pre" || status === "post") {
            statusText = "盘前/盘后交易中";
            statusColor = "#F39C12";
          } else if (status === "holiday") {
            statusText = "公众假期";
            statusColor = "#E74C3C";
          } else if (status === "weekend") {
            statusText = "周末休息";
            statusColor = "#9E9E9E";
          } else {
            statusText = "非交易时间";
            statusColor = "#95A5A6";
          }

          html += `<span style="color: ${statusColor}; font-weight: bold;">●</span> ${exchange.name}: ${statusText} (当地时间 ${localTimeStr}, UTC${tzOffset >= 0 ? "+" : ""}${tzOffset})<br>`;
        });
        infoDiv.innerHTML = html;
      }

      function generateHolidays(year) {

      function addDays(date, days) {
        const d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
      }

      function getGoodFriday(year) {
        const a = year % 19;
        const b = Math.floor(year / 100);
        const c = year % 100;
        const d = Math.floor(b / 4);
        const e = b % 4;
        const f = Math.floor((b + 8) / 25);
        const g = Math.floor((b - f + 1) / 3);
        const h = (19 * a + b - d - g + 15) % 30;
        const i = Math.floor(c / 4);
        const k = c % 4;
        const l = (32 + 2 * e + 2 * i - h - k) % 7;
        const m = Math.floor((a + 11 * h + 22 * l) / 451);
        const month = Math.floor((h + l - 7 * m + 114) / 31);
        const day = ((h + l - 7 * m + 114) % 31) + 1;
        const easter = new Date(year, month - 1, day);
        return addDays(easter, -2);
      }

      function getSpringFestival(year) {
        const lunarDates = {
          2026: "2026-02-17",
          2027: "2027-02-06",
          2028: "2028-01-26",
          2029: "2029-02-13",
          2030: "2030-02-03",
          2031: "2031-01-23",
        };
        return lunarDates[year] || "2026-02-17";
      }

      function getLunarNewYear(year) {
        return new Date(getSpringFestival(year));
      }

      function getLunarNewYearEve(year) {
        return addDays(getLunarNewYear(year), -1).toISOString().split("T")[0];
      }

      function getQingming(year) {
        const base = new Date(year, 3, 4);
        const offset = [4, 4, 4, 5, 5, 5, 5, 5, 4, 4, 4, 4];
        base.setDate(4 + offset[(year - 2000) % 12]);
        return base.toISOString().split("T")[0];
      }

      function getDragonBoat(year) {
        const dates = {
          2026: "2026-06-19",
          2027: "2027-06-09",
          2028: "2028-05-28",
          2029: "2029-06-16",
          2030: "2030-06-05",
        };
        return dates[year] || "2026-06-19";
      }

      function getMidAutumn(year) {
        const dates = {
          2026: "2026-09-26",
          2027: "2027-09-15",
          2028: "2028-10-03",
          2029: "2029-09-22",
          2030: "2030-09-12",
        };
        return dates[year] || "2026-09-26";
      }

      function getMidAutumnDayAfter(year) {
        return addDays(new Date(getMidAutumn(year)), 1)
          .toISOString()
          .split("T")[0];
      }

      function getBuddhaBirthday(year) {

          2026: "2026-05-25",
          2027: "2027-05-14",
          2028: "2028-05-02",
          2029: "2029-05-21",

      function getVernalEquinox(year) {
        return new Date(year, 2, 20 + (year % 4 === 0 ? 0 : 1));
      }

      function getAutumnalEquinox(year) {
        return new Date(year, 8, 22 + (year % 4 === 0 ? 1 : 0));

      function getDiwali(year) {

      function getGuruNanak(year) {
        const dates = {

          2028: "2028-11-17",
          2029: "2029-11-06",
          2030: "2030-11-25",
        };
        return new Date(dates[year] || "2026-11-10");
      }

      function getIndependenceDay(year) {
        const d = new Date(year, 6, 4);
        if (d.getDay() === 0) return addDays(d, 1);
        if (d.getDay() === 6) return addDays(d, -1);
        return d;
      }

      function loadHolidays() {
        const currentYear = new Date().getFullYear();
        const holidays = {
          ...generateHolidays(currentYear),
          ...generateHolidays(currentYear + 1),
        };

        EXCHANGES.forEach((exchange) => {
          if (exchange.country && holidays[exchange.country]) {
            exchange.holidays = holidays[exchange.country];
          }
        });
        renderChart();
      }

      function refreshHolidays() {
        const infoDiv = document.getElementById("exchangeInfo");
        const originalContent = infoDiv.innerHTML;
        infoDiv.innerHTML =
          '<span class="loading">🔄 正在更新假期数据...</span>';

        setTimeout(() => {
          loadHolidays();
          infoDiv.innerHTML =
            '<span class="loading" style="color: #2ECC71;">✓ 假期数据更新完成！</span><br>' +
            infoDiv.innerHTML;
          setTimeout(() => renderChart(), 100);
        }, 500);
      }

      loadHolidays();
      renderChart();
    </script>
